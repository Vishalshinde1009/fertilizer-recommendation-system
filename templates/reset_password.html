{% extends "base.html" %}

{% block content %}
<section class="auth-section">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-5 col-md-8">
                <div class="auth-card reveal-card">
                    <span class="eyebrow green">Secure Reset</span>
                    <h1>Set New Password</h1>
                    <p>Choose a new password for your FertiAI account.</p>

                    <form class="needs-validation" method="post" novalidate>
                        <div class="mb-3">
                            <label class="form-label" for="password">New password</label>
                            <input class="form-control form-control-lg" type="password" id="password" name="password" minlength="6" required>
                            <div class="invalid-feedback">Use at least 6 characters.</div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label" for="confirm_password">Confirm password</label>
                            <input class="form-control form-control-lg" type="password" id="confirm_password" name="confirm_password" minlength="6" required>
                            <div class="invalid-feedback">Please confirm your password.</div>
                        </div>
                        <button class="btn btn-success btn-lg w-100 animated-btn" type="submit">
                            <i class="fa-solid fa-shield-halved me-2"></i>Reset Password
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
