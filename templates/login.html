{% extends "base.html" %}

{% block content %}
<section class="auth-section">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-5 col-md-8">
                <div class="auth-card reveal-card">
                    <span class="eyebrow green">Welcome Back</span>
                    <h1>Login to FertiAI</h1>
                    <p>Access fertilizer predictions, irrigation advice, reports, and your dashboard.</p>

                    <form class="needs-validation" method="post" novalidate>
                        <div class="mb-3">
                            <label class="form-label" for="email">Email address</label>
                            <input class="form-control form-control-lg" type="email" id="email" name="email" required>
                            <div class="invalid-feedback">Please enter your email.</div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="password">Password</label>
                            <input class="form-control form-control-lg" type="password" id="password" name="password" required>
                            <div class="invalid-feedback">Please enter your password.</div>
                        </div>
                        <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-4">
                            <a href="{{ url_for('forgot_password') }}">Forgot password?</a>
                            <span class="small text-muted">New farmer? <a href="{{ url_for('register') }}">Register</a></span>
                        </div>
                        <button class="btn btn-success btn-lg w-100 animated-btn" type="submit">
                            <i class="fa-solid fa-right-to-bracket me-2"></i>Login
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
